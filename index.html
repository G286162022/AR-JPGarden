<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AR JP Garden</title>

  <!-- Three.js (非モジュール版) -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/loaders/GLTFLoader.js"></script>

  <!-- MindAR -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js"></script>

  <style>
    html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden;background:#000;}
    #ui{
      position:fixed;left:12px;top:12px;z-index:10;
      padding:10px;border-radius:12px;
      background:rgba(0,0,0,.6);color:#fff;font-family:sans-serif;
    }
    button{
      margin-top:8px;padding:8px 12px;border-radius:8px;border:none;
    }
  </style>
</head>

<body>
  <div id="ui">
    <div>開始を押してカメラを許可</div>
    <button id="start">開始</button>
  </div>

<script>
const startBtn = document.getElementById("start");

startBtn.addEventListener("click", async () => {

  const mindarThree = new window.MINDAR.IMAGE.MindARThree({
    container: document.body,
    imageTargetSrc: "./targets.mind",
    maxTrack: 2,
  });

  const {renderer, scene, camera} = mindarThree;

  scene.add(new THREE.AmbientLight(0xffffff, 1));

  const anchorDay = mindarThree.addAnchor(0);
  const anchorNight = mindarThree.addAnchor(1);

  const loader = new THREE.GLTFLoader();

  loader.load("./day.glb", (gltf)=>{
    anchorDay.group.add(gltf.scene);
  });

  loader.load("./night.glb", (gltf)=>{
    anchorNight.group.add(gltf.scene);
  });

  anchorDay.onTargetFound = ()=>{ console.log("DAY"); };
  anchorNight.onTargetFound = ()=>{ console.log("NIGHT"); };

  await mindarThree.start();
  renderer.setAnimationLoop(()=>renderer.render(scene,camera));

  startBtn.style.display="none";
});
</script>

</body>
</html>
