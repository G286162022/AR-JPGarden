<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

    <!-- MindAR (A-Frame) : まずは動作優先で 1.1.4 に合わせる -->
    <script src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.1.4/dist/mindar-image.prod.js"></script>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.1.4/dist/mindar-image-aframe.prod.js"></script>

    <!--<style>
      html, body { margin:0; padding:0; width:100%; height:100%; overflow:hidden; background:#000; }
      #hint {
        position: fixed; left: 12px; top: 12px; z-index: 9999;
        padding: 10px 12px; border-radius: 12px;
        background: rgba(0,0,0,.6); color:#fff; font: 14px/1.4 system-ui, -apple-system, sans-serif;
        max-width: 84vw;
      }
    </style>-->
  </head>

  <body>
    <!--<div id="hint">カメラ許可 → 昼/夜イラストにかざしてください</div>-->

    <a-scene
      mindar-image="imageTargetSrc: ./targets.mind; maxTrack: 2"
      color-space="sRGB"
      renderer="colorManagement: true; physicallyCorrectLights: true"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
    >

      <a-assets>
        <!-- 昼 -->
        <a-asset-item id="bg" src="./bg.glb"></a-asset-item>
        <a-asset-item id="mg" src="./mg.glb"></a-asset-item>
        <a-asset-item id="fg" src="./fg.glb"></a-asset-item>

        <!-- 夜 -->
        <a-asset-item id="nbg" src="./night_bg.glb"></a-asset-item>
        <a-asset-item id="nmg" src="./night_mg.glb"></a-asset-item>
        <a-asset-item id="nfg" src="./night_fg.glb"></a-asset-item>
      </a-assets>

      <a-light type="ambient" intensity="1.4"></a-light>
      <a-light type="directional" position="1 1 1" intensity="0.9"></a-light>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <!-- ===== 昼 ===== -->
      <a-entity mindar-image-target="targetIndex: 0">

        <a-gltf-model src="#bg"
          position="0 0 0"
          scale="1 1 1"
          render-order="1"
          material="side: double; transparent: true; depthWrite: false">
        </a-gltf-model>

        <a-gltf-model src="#mg"
          position="0 0 0.02"
          scale="1.02 1.02 1.02"
          render-order="2"
          material="side: double; transparent: true; depthWrite: false">
        </a-gltf-model>

        <a-gltf-model src="#fg"
          position="0 0 0.04"
          scale="1.04 1.04 1.04"
          render-order="3"
          material="side: double; transparent: true; depthWrite: false">
        </a-gltf-model>

      </a-entity>

      <!-- ===== 夜 ===== -->
      <a-entity mindar-image-target="targetIndex: 1">

        <a-gltf-model src="#nbg"
          position="0 0 0"
          scale="1 1 1"
          render-order="1"
          material="side: double; transparent: true; depthWrite: false">
        </a-gltf-model>

        <a-gltf-model src="#nmg"
          position="0 0 0.02"
          scale="1.02 1.02 1.02"
          render-order="2"
          material="side: double; transparent: true; depthWrite: false">
        </a-gltf-model>

        <a-gltf-model src="#nfg"
          position="0 0 0.04"
          scale="1.04 1.04 1.04"
          render-order="3"
          material="side: double; transparent: true; depthWrite: false">
        </a-gltf-model>

      </a-entity>

    </a-scene>
  </body>
</html>
